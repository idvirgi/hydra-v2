name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            APP_DIR="$HOME/hydra-v2"
            BACKUP_DIR_ROOT="$HOME/hydra-v2-backups"
            REPO_URL="https://github.com/idvirgi/hydra-v2.git"
            N8N_PUBLIC_BASE_URL="https://static.181.169.104.178.clients.your-server.de"
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              if [ -d "$APP_DIR" ]; then
                BACKUP_DIR="$HOME/hydra-v2-pre-git-$(date +%Y%m%d-%H%M%S)"
                mv "$APP_DIR" "$BACKUP_DIR"
              fi
              git clone "$REPO_URL" "$APP_DIR"
              if [ -n "${BACKUP_DIR:-}" ]; then
                for item in .env n8n_data redis_data logs; do
                  if [ -e "$BACKUP_DIR/$item" ]; then
                    mv "$BACKUP_DIR/$item" "$APP_DIR/$item"
                  fi
                done
              fi
            fi
            cd "$APP_DIR"
            mkdir -p "$BACKUP_DIR_ROOT"
            if [ -f "$APP_DIR/.env" ]; then
              FIX_BACKUP="$BACKUP_DIR_ROOT/hydra-etsy-oauth-fix-$(date +%Y%m%d-%H%M%S).tgz"
              tar -czf "$FIX_BACKUP" -C "$APP_DIR" .env n8n_workflows/3_publisher.json n8n_workflows/4_etsy_oauth_callback.json
              upsert_env() {
                key="$1"
                value="$2"
                file="$3"
                if grep -q "^${key}=" "$file"; then
                  sed -i "s|^${key}=.*|${key}=${value}|" "$file"
                else
                  printf '%s=%s\n' "$key" "$value" >> "$file"
                fi
              }
              upsert_env ETSY_REDIRECT_URI "https://static.181.169.104.178.clients.your-server.de/webhook/etsy/oauth/callback" "$APP_DIR/.env"
              upsert_env N8N_EDITOR_BASE_URL "https://static.181.169.104.178.clients.your-server.de" "$APP_DIR/.env"
              upsert_env WEBHOOK_URL "https://static.181.169.104.178.clients.your-server.de/" "$APP_DIR/.env"
              grep -E '^(ETSY_REDIRECT_URI|N8N_EDITOR_BASE_URL|WEBHOOK_URL)=' "$APP_DIR/.env"
            fi
            mkdir -p n8n_data logs
            chown -R 1000:1000 n8n_data
            docker compose up -d --build
            until curl -sf http://127.0.0.1:5678 >/dev/null; do sleep 5; done
            docker exec hydra_n8n printenv ETSY_REDIRECT_URI N8N_EDITOR_BASE_URL WEBHOOK_URL || true
            docker run --rm --network host -v "$HOME/hydra-v2:/work" hydra-brain:latest \
              python /work/tools/sync_n8n_workflows.py \
              --base-url "$N8N_PUBLIC_BASE_URL" \
              --env-file /work/.env \
              --workflow-dir /work/n8n_workflows
            CALLBACK_STATUS=$(curl -ksS -o /tmp/hydra_etsy_callback_probe.txt -w '%{http_code}' "$N8N_PUBLIC_BASE_URL/webhook/etsy/oauth/callback?code=hydra_probe_invalid&state=hydra_probe_state")
            echo "CALLBACK_PROBE_STATUS=$CALLBACK_STATUS"
            if grep -qi 'access to env vars denied' /tmp/hydra_etsy_callback_probe.txt; then
              echo 'CALLBACK_ENV_ACCESS_ERROR=YES'
              cat /tmp/hydra_etsy_callback_probe.txt
              exit 1
            fi
            echo 'CALLBACK_ENV_ACCESS_ERROR=NO'
            head -c 400 /tmp/hydra_etsy_callback_probe.txt || true
            echo
            docker run --rm --network hydra_net -v "$HOME/hydra-v2:/work" hydra-brain:latest \
              python /work/tools/verify_integrations.py \
              --env-file /work/.env \
              --n8n-base-url http://hydra_n8n:5678 \
              --core-only
            docker run --rm --network hydra_net -v "$HOME/hydra-v2:/work" hydra-brain:latest \
              python /work/tools/verify_autonomy_foundation.py \
              --cleanup
            docker stop hydra_brain >/dev/null 2>&1 || true
            docker exec hydra_redis redis-cli DEL hydra:decision:cycle:lock >/dev/null 2>&1 || true
            trap 'docker start hydra_brain >/dev/null 2>&1 || true' EXIT
            PYTHONUNBUFFERED=1 docker run --rm --network hydra_net --env-file "$HOME/hydra-v2/.env" \
              -e HYDRA_SCOUT_CANDIDATE_COUNT=3 \
              -e HYDRA_SCOUT_CANDIDATE_COUNT_CHEAP=3 \
              -e HYDRA_APIFY_MAX_ITEMS=3 \
              -e HYDRA_APIFY_MAX_ITEMS_CHEAP=3 \
              -e HYDRA_MODEL_ANALYSIS_LIMIT=1 \
              -e HYDRA_MODEL_ANALYSIS_LIMIT_CHEAP=1 \
              -e HYDRA_SHORTLIST_SIZE=2 \
              -e HYDRA_BUILD_HANDOFF_LIMIT=1 \
              -v "$HOME/hydra-v2:/work" hydra-brain:latest \
              python /work/tools/verify_decision_engine.py \
              --force-refresh
            trap - EXIT
            docker start hydra_brain >/dev/null
            docker run --rm --network hydra_net -v "$HOME/hydra-v2:/work" hydra-brain:latest \
              python /work/tools/runtime_status.py
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            docker logs hydra_brain --tail 20
            docker logs hydra_builder --tail 20
            docker logs hydra_publisher --tail 20
