name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            APP_DIR="$HOME/hydra-v2"
            REPO_URL="https://github.com/idvirgi/hydra-v2.git"
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              if [ -d "$APP_DIR" ]; then
                BACKUP_DIR="$HOME/hydra-v2-pre-git-$(date +%Y%m%d-%H%M%S)"
                mv "$APP_DIR" "$BACKUP_DIR"
              fi
              git clone "$REPO_URL" "$APP_DIR"
              if [ -n "${BACKUP_DIR:-}" ]; then
                for item in .env n8n_data redis_data logs; do
                  if [ -e "$BACKUP_DIR/$item" ]; then
                    mv "$BACKUP_DIR/$item" "$APP_DIR/$item"
                  fi
                done
              fi
            fi
            cd "$APP_DIR"
            mkdir -p n8n_data logs
            chown -R 1000:1000 n8n_data
            docker compose up -d --build
            until curl -sf http://127.0.0.1:5678 >/dev/null; do sleep 5; done
            docker run --rm --network host -v "$HOME/hydra-v2:/work" python:3.11-slim \
              python /work/tools/sync_n8n_workflows.py \
              --base-url http://127.0.0.1:5678 \
              --env-file /work/.env \
              --workflow-dir /work/n8n_workflows
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            docker logs hydra_brain --tail 20
